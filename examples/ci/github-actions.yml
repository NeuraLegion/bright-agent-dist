# Bright Agent — GitHub Actions example
#
# Copy this to `.github/workflows/bright-agent.yml` in YOUR application repo.
# It checks out your repo, runs Bright Agent against that working copy, and
# opens a pull request with verified fixes. (Bright Agent no longer clones —
# it operates on the checked-out tree.)
#
# Scans are resource-intensive, so this runs on-demand and on a nightly
# schedule — not on every push.
#
# Runner prerequisites: Docker, Docker Compose, Git (all present on
# GitHub-hosted `ubuntu-latest`; self-hosted runners must provide them).
#
# Required repository secrets:
#     BRIGHT_TOKEN      Bright API token from https://app.brightsec.com
#     INFERENCE_TOKEN   API token for your OpenAI-compatible inference endpoint
#   and one repository variable:
#     INFERENCE_URL     that endpoint's base URL (OpenAI, GitHub Models, Ollama, …)
#
# Repo access uses the built-in GITHUB_TOKEN (see the `permissions:` block).

name: Bright Agent (DAST)

on:
  workflow_dispatch: {} # manual trigger
  schedule:
    - cron: "0 3 * * *" # nightly at 03:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  bright-agent:
    runs-on: ubuntu-latest
    env:
      # Runner platform/arch: linux-x64 | linux-arm64 | darwin-x64 | darwin-arm64
      ASSET: bright-agent-linux-x64
    steps:
      # Check out the repo to scan. fetch-depth: 2 gives a parent commit for diffs.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      # Download the binary OUTSIDE the checkout ($RUNNER_TEMP) so it is never
      # swept into the fix commit (the agent commits with `git add -A`).
      - name: Download & verify Bright Agent
        working-directory: ${{ runner.temp }}
        run: |
          # Latest release. To pin a version, replace 'latest/download' with
          # 'download/<tag>', e.g. .../releases/download/v0.1.1
          base="https://github.com/NeuraLegion/bright-agent-dist/releases/latest/download"
          curl -fsSL -o "${ASSET}" "${base}/${ASSET}"
          curl -fsSL -o "${ASSET}.sha256" "${base}/${ASSET}.sha256"
          sha256sum -c "${ASSET}.sha256"
          chmod +x "${ASSET}"

      - name: Run Bright Agent
        env:
          # Run against the checked-out tree. REPOSITORY_URL is derived from the
          # checkout's `origin` remote (set REPOSITORY_URL to override).
          LOCAL_REPO_PATH: ${{ github.workspace }}
          REPO_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRIGHT_TOKEN: ${{ secrets.BRIGHT_TOKEN }}
          # Your own OpenAI-compatible inference endpoint + token:
          INFERENCE_URL: ${{ vars.INFERENCE_URL }}
          INFERENCE_TOKEN: ${{ secrets.INFERENCE_TOKEN }}
          # Optional:
          # AI_MODEL: gpt-5.4-mini
          # RUN_MODE: full
          # BRIGHT_HOSTNAME: app.brightsec.com
          # BRIGHT_DEBUG: "1"
        run: "${{ runner.temp }}/${{ env.ASSET }}"

# NOTE: PRs and pushes made with GITHUB_TOKEN do not trigger your other
# workflows (GitHub's anti-recursion rule). If you need the fix PR to run your
# repo's CI checks, create a PAT secret and use it instead, e.g.:
#     REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
