# Bright Agent — CircleCI example
#
# Copy this to `.circleci/config.yml` in YOUR application repo.
#
# IMPORTANT: use the `machine` executor (a full Linux VM). The agent runs
# `docker compose` to build and start your application, then scans it on
# localhost — this needs real Docker access. The `docker` executor with
# `setup_remote_docker` runs Docker on a separate host and cannot reach the
# app on localhost, so it will not work here.
#
# Runner prerequisites: Docker, Docker Compose, Git (all present on the
# CircleCI machine image below).
#
# Required environment variables — set them as Project Environment Variables
# (Project Settings → Environment Variables) or via a Context:
#     BRIGHT_TOKEN        Bright API token from https://app.brightsec.com
#     REPO_ACCESS_TOKEN   PAT that can push branches and open PRs
#     INFERENCE_TOKEN     API token for your OpenAI-compatible inference endpoint

version: 2.1

jobs:
  bright-agent:
    machine:
      image: ubuntu-2404:current # includes Docker, Docker Compose, and git
    environment:
      # Pin to a released tag — see https://github.com/NeuraLegion/bright-agent-dist/releases
      BRIGHT_AGENT_VERSION: v0.1.0
      ASSET: bright-agent-linux-x64
      # Your OpenAI-compatible inference endpoint (the token is a project secret):
      INFERENCE_URL: https://api.openai.com/v1
    steps:
      - checkout # clones YOUR repo into the working directory
      - run:
          name: Download & verify Bright Agent (outside the checkout)
          command: |
            base="https://github.com/NeuraLegion/bright-agent-dist/releases/download/${BRIGHT_AGENT_VERSION}"
            curl -fsSL -o "/tmp/${ASSET}" "${base}/${ASSET}"
            curl -fsSL -o "/tmp/${ASSET}.sha256" "${base}/${ASSET}.sha256"
            ( cd /tmp && sha256sum -c "${ASSET}.sha256" )
            chmod +x "/tmp/${ASSET}"
      - run:
          name: Run Bright Agent
          # Runs against the checked-out tree (cwd); REPOSITORY_URL is derived
          # from its 'origin' remote. BRIGHT_TOKEN, REPO_ACCESS_TOKEN and
          # INFERENCE_TOKEN come from project env vars / context.
          command: LOCAL_REPO_PATH="$(pwd)" "/tmp/${ASSET}"

workflows:
  nightly-dast:
    triggers:
      - schedule:
          cron: "0 3 * * *" # nightly at 03:00 UTC
          filters:
            branches:
              only:
                - main
    jobs:
      - bright-agent
